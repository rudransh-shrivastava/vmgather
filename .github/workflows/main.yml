name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * *' # Run nightly at midnight UTC

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ['1.21', '1.22']
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5.6.0
        with:
          go-version: ${{ matrix.go }}

      - name: Lint
        if: matrix.os == 'ubuntu-latest' && matrix.go == '1.22'
        uses: golangci/golangci-lint-action@d6238b002a20823d52840fda27e2d4891c5952dc  # v4.0.1
        with:
          version: v1.59.1
          args: --timeout=5m
      
      - name: Run tests
        run: make test
      
      - name: Build
        run: make build

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5.6.0
        with:
          go-version: '1.22'

      - name: Run integration suite
        shell: bash
        run: |
          set -euo pipefail
          cleanup() {
            make test-env-down || true
          }
          trap cleanup EXIT
          make test-env-up
          eval "$(cd local-test-env && ./testconfig env)"
          LIVE_VM_URL="${VM_SINGLE_NOAUTH_URL}" INTEGRATION_TEST=1 go test -tags "integration realdiscovery" ./tests/integration/...

  docker-images:
    name: Docker Images
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130  # v3.7.0

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3.12.0

      - name: Build Docker images (smoke)
        run: make docker-build PLATFORMS=linux/amd64

  e2e-smoke:
    name: Playwright Smoke
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5.6.0
        with:
          go-version: '1.22'

      - name: Build binaries
        run: make build

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '18'

      - name: Install Playwright deps
        run: |
          cd tests/e2e
          npm ci
          npx playwright install --with-deps

      - name: Run smoke tests
        run: |
          cd tests/e2e
          npm run test:smoke
  # E2E tests disabled in CI - require Docker environment
